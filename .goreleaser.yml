version: 2

project_name: portwing

release:
  # Mark rc/beta/alpha tags as GitHub prereleases so they don't surface as the
  # "Latest release"; stable tags create a normal release. (The dockers_v2
  # `:latest` tag is independently guarded by `not .Prerelease`.)
  prerelease: auto

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: portwing
    main: ./cmd/portwing
    binary: portwing
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/codeswhat/portwing/internal/protocol.AgentVersion={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

checksum:
  name_template: "checksums.txt"

sboms:
  - id: cyclonedx
    documents:
      - "${artifact}.cyclonedx.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
    artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
    # dockers_v2 pushes a single multi-arch OCI index per tag (no per-arch
    # -amd64/-arm64/-armv7 tags), so `all` signs that index — exactly the
    # image `cosign verify ghcr.io/codeswhat/portwing:<tag>` checks on pull.
    artifacts: all
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^📝"
      - "^🧪"
      - "^🔧"
      - "^🎨"

# One dockers_v2 entry builds all three platforms in a single buildx run and
# pushes a single multi-arch OCI index per tag — it replaces the old per-arch
# `dockers` + `docker_manifests` blocks (both deprecated in GoReleaser v2).
# The unified Dockerfile.release selects Wolfi (amd64/arm64) or Alpine (armv7)
# per arch and copies the binary from the $TARGETPLATFORM/ context subdir.
dockers_v2:
  - id: portwing
    dockerfile: Dockerfile.release
    ids:
      - portwing
    images:
      - "ghcr.io/codeswhat/portwing"
    tags:
      - "{{ .Version }}"
      # Empty tags are ignored, so prereleases never move :latest.
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    # Attach a Syft image SBOM to the pushed index (buildx attestation). This
    # is additive to the archive-level `sboms:` block above, which covers the
    # binaries but not the image's OS packages.
    sbom: "true"
