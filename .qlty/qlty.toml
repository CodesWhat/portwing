# This file was automatically generated by `qlty init` and then hand-tuned
# to mirror drydock's quality-gate posture for this Go repo.
# Committed so both local CLI and Qlty Cloud use identical configuration.
#
# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/build/**",
  "**/coverage/**",
  "**/cache/**",
  "**/dist/**",
  "**/generated/**",
  "**/vendor/**",
  "**/target/**",
  "**/testdata/**",
  ".qlty/out/**",
  ".qlty/logs/**",
  ".qlty/results/**",
  ".qlty/plugin_cachedir/**",
  ".claude/**",
  ".playwright-mcp/**",
  "node_modules/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# Disabled: guard clauses, switch dispatches, and protocol-dispatch tables
# produce many returns by design in this codebase
[smells.return_statements]
enabled = false

# Disabled: core domain files (adapters, server, MCP handler) are inherently
# complex; splitting them would hurt cohesion without improving readability
[smells.file_complexity]
enabled = false

[[source]]
name = "default"
default = true

[[plugin]]
name = "actionlint"

[[plugin]]
name = "checkov"

[[plugin]]
name = "dockerfmt"

[[plugin]]
name = "hadolint"

[[plugin]]
name = "markdownlint"
mode = "comment"
# Pinned so the markdownlint ruleset is identical locally and in CI. Left
# unpinned, qlty resolves whatever markdownlint the installed CLI defaults to,
# which drifts between a developer's qlty and CI's (latest) qlty.
version = "0.46.0"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"
# Pinned to the version GitHub Actions ubuntu-latest pre-installs.
# qlty otherwise resolves to the latest (0.11.0) and rejects the runner's
# 0.9.0 binary with "Invalid tool version", failing the lint job.
version = "0.9.0"

[[plugin]]
name = "shfmt"

[[plugin]]
name = "trivy"
drivers = [
  "config",
]
version = "0.69.3"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

# Stage 3 is a scratch-based image (FROM scratch). No USER directive is present
# because the agent runs as root by default to reach the Docker socket; privilege
# drop to UID 65532 is documented as a deploy-time step in SECURITY.md and the
# examples/. This matches drydock's identical posture.
[[triage]]
match.rules = ["trivy:DS002", "trivy:DS-0002"]
set.ignored = true

# markdownlint table style is low-signal for this repository's docs format
[[triage]]
match.rules = ["markdownlint:MD060"]
set.ignored = true

# workflow_dispatch inputs in fuzz/soak/release-cut workflows are intentional
# runtime controls (fuzz duration, soak duration, release tag). The build
# artifact is the Go binary, not influenced by these string inputs.
[[triage]]
match.rules = ["checkov:CKV_GHA_7"]
set.ignored = true

# Builder stages (golang:alpine, wolfi-base) are intermediate build images, not
# the final runtime. No USER is required in a builder stage — the final FROM
# scratch stage carries no shell or package manager for an attacker to use.
# CKV_DOCKER_3 on builder stages is a false positive here.
[[triage]]
match.rules = ["checkov:CKV_DOCKER_3"]
set.ignored = true

# Wolfi/Alpine apk packages in builder and rootfs assembly stages cannot be
# pinned to a specific version without breaking reproducibility across
# architecture builds. The final runtime is FROM scratch with only the binary.
[[triage]]
match.rules = ["hadolint:DL3018"]
set.ignored = true

# Dockerfile.release line 46 uses 'FROM rootfs-' which is a local multi-stage
# alias (defined in the same file), not a remote registry image. Checkov/trivy
# misidentify local stage references as untagged registry images.
[[triage]]
match.rules = ["checkov:CKV_DOCKER_7", "trivy:DS-0001"]
set.ignored = true

# Kubernetes example manifests intentionally expose the Docker socket because
# that is the core function of a Docker-agent (Portwing must read Docker events
# on the host). The security posture is documented in SECURITY.md.
[[triage]]
match.rules = [
  "checkov:CKV_K8S_27",
  "trivy:KSV-0006",
  "trivy:KSV-0023",
]
set.ignored = true

# Example manifests use 'latest' tag as a convenience for first-run setup.
# Production deployments pin to a digest — this is documented in examples/README.md.
[[triage]]
match.rules = [
  "checkov:CKV_K8S_14",
  "checkov:CKV_K8S_43",
  "trivy:KSV-0013",
  "trivy:KSV-0125",
  "hadolint:DL3006",
]
set.ignored = true

# CKV_K8S_38: Service Account Token auto-mounting is the Kubernetes default.
# Disabling it would break secret injection in many cluster configurations.
[[triage]]
match.rules = ["checkov:CKV_K8S_38"]
set.ignored = true

# Kubernetes NetworkPolicy is out of scope for example manifests; cluster
# operators apply their own network policies.
[[triage]]
match.rules = ["checkov:CKV2_K8S_6"]
set.ignored = true

# OpenAPI: /health and some public routes intentionally have no auth requirement.
# The token-gated endpoints are correctly secured; the open routes are by design.
[[triage]]
match.rules = ["checkov:CKV_OPENAPI_4", "checkov:CKV_OPENAPI_5"]
set.ignored = true

# OpenAPI array max-items: not all list endpoints have a bounded maximum;
# pagination is implemented at the application layer.
[[triage]]
match.rules = ["checkov:CKV_OPENAPI_21"]
set.ignored = true

# kubernetes/standard.yaml contains a placeholder base64 string ("REPLACE_WITH…")
# as a documentation example, not an actual secret.
[[triage]]
match.rules = ["checkov:CKV_SECRET_6"]
set.ignored = true

# SC2015: A && B || C pattern in drydock-compat-check.sh assert() helper.
# The idiom is safe here: the right-hand side is always the correct fallback
# (assert pass vs assert fail) and the second branch cannot silently swallow
# success. Same pattern is used consistently throughout the script.
[[triage]]
match.rules = ["shellcheck:2015"]
set.ignored = true

# radarlint-iac docker:S7018 (unsorted apk packages) and S7019 (shell-form CMD)
# are low-signal style issues; the packages are grouped by function, and the
# shell-form CMD in Dockerfile.dev is intentional for development convenience.
[[triage]]
match.rules = ["radarlint-iac:docker:S7018", "radarlint-iac:docker:S7019"]
set.ignored = true

# ripgrep NOTE in internal/edge/wire_contract_test.go is a legitimate test
# code comment explaining NewClient initialization; Go test files cannot be
# edited by the quality-config agent (they are owned by the Go code agent).
[[triage]]
match.rules = ["ripgrep:NOTE"]
match.file_patterns = ["**/*_test.go"]
set.ignored = true
