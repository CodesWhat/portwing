name: "✅ CI"
run-name: >-
  ${{
    github.event_name == 'schedule' && '✅ CI — Weekly schedule' ||
    github.event_name == 'pull_request' && format('✅ CI — PR #{0}', github.event.pull_request.number) ||
    format('✅ CI — {0}', github.ref_name)
  }}

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main, "dev/**"]
  schedule:
    - cron: '30 6 * * 1'  # Weekly on Monday at 06:30 UTC

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "🏗️ Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # OIDC for the Qlty coverage upload: id-token mints the token, contents is
    # for checkout. No coverage secret to store or rotate.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: go mod verify

      - name: Format check
        run: |
          FILES=$(gofmt -l .)
          if [ -n "$FILES" ]; then
            echo "::error::gofmt differences found — run 'gofmt -w .' and commit:"
            echo "$FILES"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o portwing ./cmd/portwing

      - name: Test
        # Coverage measures PRODUCT code only: internal/* + cmd/*. The three tool
        # mains — benchmarks/cmd/loadgen, benchmarks/cmd/mockdocker, and the
        # internal/banner/gen art generator — are dev/build tooling, not shipped
        # code, so they're excluded from the coverprofile (and the floor below).
        # `go vet ./...` above still compiles them, so they can't silently rot.
        run: |
          mapfile -t PKGS < <(go list ./internal/... ./cmd/... | grep -v '/internal/banner/gen')
          go test -race -covermode=atomic -coverprofile=coverage.out "${PKGS[@]}"

      - name: Publish coverage to Qlty
        # Org-wide coverage consolidated on Qlty Cloud (replaces Codecov).
        # OIDC auth — no token to store or rotate. Skipped on fork PRs, which
        # GitHub does not grant id-token:write. Advisory: continue-on-error so a
        # publish hiccup never blocks CI; the coverage gate below is enforcement.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: qltysh/qlty-action/coverage@fd52dc852530a708d68c3b7342f8d33d1df4cd55  # v2.2.1
        with:
          oidc: true
          files: coverage.out
          format: coverprofile

      - name: Coverage gate
        # Vendor-free floor: fails when the weighted statement total (product
        # packages only — see the Test step) drops below COVERAGE_MIN. Achieved
        # 97.5% after systematic gap-fill (2026-06). Residual 2.5% is structurally
        # unreachable: os.Exit in main, crypto/rand failure, json.Marshal on safe
        # primitive-only types, WebSocket SetWriteDeadline errors, 5-min cleanup
        # ticker, and compile-time GOOS=windows branches. See COVERAGE.md.
        # Floor is set conservatively at 96 (~1.5% below achieved) so CI never
        # flakes red on coverage. go.mod is at the repo root; no path rewrite needed.
        env:
          COVERAGE_MIN: "96"
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total statement coverage: ${total}% (floor ${COVERAGE_MIN}%)"
          awk -v t="$total" -v m="$COVERAGE_MIN" 'BEGIN { exit (t+0 >= m+0) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the ${COVERAGE_MIN}% floor"
            exit 1
          }

  lint:
    name: "🧹 Lint"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1

  vuln:
    name: "🔍 Govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0

      - name: Run govulncheck
        run: govulncheck ./...

  zizmor:
    name: "🔒 Workflow Security"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          token: ${{ github.token }}
          online-audits: false
          advanced-security: false

  commit-message:
    name: "💬 Commit Message"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # advisory — does not block merge

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          set -euo pipefail

          failed=0
          while IFS= read -r msg; do
            first_line="$(echo "${msg}" | head -n1)"
            if ! echo "${first_line}" | grep -qP '^(\p{So}|\p{Emoji_Presentation})+\s+\w+(\(\w[\w-]*\))?!?:\s.+$'; then
              echo "::warning::Non-conventional commit: ${first_line}"
              failed=1
            fi
          done < <(git log --format=%s origin/main..HEAD)

          if [ "${failed}" -eq 1 ]; then
            echo "::warning::Some commits don't follow emoji conventional format. Expected: <emoji> <type>(scope): description"
          fi

  goreleaser-check:
    name: "📦 GoReleaser Config"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser check
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          # Pin to the v2 major line (matches release.yml) so the config check
          # runs the same GoReleaser major that ships releases, and to clear the
          # action's "using 'latest' as default version" advisory.
          version: "~> v2"
          args: check

  codeql:
    name: "🔍 CodeQL Analysis"
    # CodeQL SARIF upload requires GitHub Advanced Security (GHAS), which is not
    # available on free private repos. Skip unless the repo is public.
    if: github.event.repository.visibility == 'public' && (github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: actions, go
          queries: security-and-quality

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build Go
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

  dependency-review:
    name: "📦 Dependency Review"
    # Runs on public-repo PRs and gates the merge. Requires the Dependency
    # Graph feature, which is enabled on this repo
    # (Settings → Advanced Security → Dependency graph).
    if: github.event.repository.visibility == 'public' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0

  go-fuzz:
    # Tier 1 — per-PR smoke-level fuzzing. Each fuzzer gets a fixed 60 s
    # coverage budget in its own matrix job. Deep-coverage tier lives in
    # quality-fuzz-nightly.yml where each fuzzer gets 5 minutes.
    name: "🔀 Go Fuzz (${{ matrix.fuzzer.name }})"
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        fuzzer:
          - { name: FuzzParsePHC,           pkg: ./internal/server/ }
          - { name: FuzzParseTrustedProxies, pkg: ./internal/server/ }
          - { name: FuzzParseImageRef,       pkg: ./internal/adapter/ }
          - { name: FuzzParseLabels,         pkg: ./internal/adapter/drydock/ }
          - { name: FuzzMCPHandler,          pkg: ./internal/mcp/ }

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Fuzz ${{ matrix.fuzzer.name }}
        env:
          FUZZER: ${{ matrix.fuzzer.name }}
          PKG: ${{ matrix.fuzzer.pkg }}
          FUZZTIME: 60s
          TEST_TIMEOUT: 5m
        run: |
          LOG="${RUNNER_TEMP}/fuzz-${FUZZER}.log"

          # Primary fix: cap workers below the core count so the fuzzing
          # coordinator always keeps a core. This PREVENTS the starvation that
          # surfaces as a spurious "context deadline exceeded" (the hook does
          # the same); the retry below is only a backstop. max(1, min(4, cores-1)).
          cores=$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
          workers=$(( cores > 1 ? cores - 1 : 1 ))
          [ "${workers}" -gt 4 ] && workers=4

          run_fuzz() {
            go test -run='^$' \
              -fuzz="^${FUZZER}\$" \
              -fuzztime="${FUZZTIME}" \
              -timeout="${TEST_TIMEOUT}" \
              -parallel="${workers}" \
              "${PKG}" 2>&1 | tee "${LOG}"
            return "${PIPESTATUS[0]}"
          }

          # Backstop: retry once on the residual known boundary race (a worker
          # still mid-input when -fuzztime expires). This trusts Go's internal
          # "context deadline exceeded" text as the flake signal — a genuinely
          # slow input that only *sometimes* exceeds -timeout would also match,
          # but handlers are verified sub-10ms and a persistently slow input
          # still fails BOTH attempts. A real crash ("Failing input written to
          # testdata") is never retried; any other failure exits immediately.
          # If Go rewords this message the gate fails closed (hard failure),
          # which is the safe direction. Mirrors quality-fuzz-nightly.yml.
          for attempt in 1 2; do
            rc=0
            run_fuzz || rc=$?
            [ "${rc}" -eq 0 ] && exit 0

            if grep -q "Failing input written to testdata" "${LOG}"; then
              echo "::error::${FUZZER} found a crashing input — commit it to the seed corpus and fix the regression."
              exit "${rc}"
            fi

            if ! grep -q "context deadline exceeded" "${LOG}"; then
              echo "::error::${FUZZER} failed for a non-flake reason (exit ${rc})."
              exit "${rc}"
            fi

            echo "::warning::${FUZZER}: known -fuzztime boundary flake on attempt ${attempt}/2."
          done

          echo "::error::${FUZZER} hit the boundary flake on both attempts."
          exit 1

      - name: Upload fuzz corpus on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.fuzzer.name }}-${{ github.run_id }}
          path: "**/testdata/fuzz/${{ matrix.fuzzer.name }}/"
          retention-days: 30
          if-no-files-found: ignore

  qlty:
    name: "🔍 Qlty Check"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Qlty
        uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55  # v2.2.1

      - name: Qlty check (all plugins, enforced)
        run: ./scripts/qlty-check-gate.sh all
