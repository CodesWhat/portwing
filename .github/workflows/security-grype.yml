name: "🛡️ Security: Grype & Govulncheck"
run-name: >-
  ${{
    github.event_name == 'schedule' && '🛡️ Security: Grype & Govulncheck — Weekly run' ||
    github.event_name == 'pull_request' && format('🛡️ Security: Grype & Govulncheck — PR #{0}', github.event.pull_request.number) ||
    format('🛡️ Security: Grype & Govulncheck — Manual by {0}', github.actor)
  }}

on:
  workflow_dispatch:
  pull_request:
    branches: [main, 'dev/*']
    # Dependency / source / build changes are what move the security
    # surface — scope PR runs to those so doc-only PRs stay fast.
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'package-lock.json'
      - '**/package.json'
      - 'Dockerfile*'
      - '.grype.yaml'
      - '.github/workflows/security-grype.yml'
  schedule:
    - cron: '15 7 * * 1'  # Weekly on Monday at 07:15 UTC

permissions:
  contents: read

env:
  GOVULNCHECK_VERSION: v1.2.0

concurrency:
  group: security-grype-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: "🔍 Security: Govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          # Reads the `toolchain go1.26.4` directive from go.mod (setup-go honors
          # toolchain over the `go` line), so the scan runs on the same pinned,
          # patched toolchain the binary is built with — one source of truth.
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Govulncheck"
            echo "- Reachability-based scan of Go dependencies (call-graph aware)"
            echo "- Tool version: ${GOVULNCHECK_VERSION}"
            echo "- Database: Go Vulnerability Database (vuln.go.dev)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-image:
    name: "🐳 Security: Grype Container Scan"
    # Image build is the heavy step; keep it on scheduled/manual runs.
    # PRs get fast, accurate dependency coverage from grype-deps +
    # govulncheck without paying for a Docker build on every push.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: portwing:grype-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype
        with:
          image: portwing:grype-scan
          severity-cutoff: high
          fail-build: true
          output-format: sarif
          config: .grype.yaml

      - name: Upload Grype SARIF to code scanning
        # Code scanning uploads require GHAS, not available on free private repos.
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-image

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Grype Container Scan"
            echo "- Scanned the built image (binary build-info → real shipped deps) for HIGH/CRITICAL CVEs"
            echo "- Base image: Wolfi (Chainguard) packages on FROM scratch"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-deps:
    name: "📦 Security: Grype Dependency Scan (Go + npm)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run Grype across the repository (Go modules + npm lockfiles)
        # Scanning the repo root catalogs go.mod/go.sum and package-lock.json,
        # so a single pass covers both ecosystems. Grype matches the
        # lockfile-resolved versions (not the full module requirement graph),
        # so it does not emit the phantom-dependency findings a manifest-graph
        # SCA reports for modules the binary never links in.
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-deps
        with:
          path: .
          severity-cutoff: high
          fail-build: true
          output-format: sarif
          config: .grype.yaml

      - name: Upload Grype dependency SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: ${{ steps.grype-deps.outputs.sarif }}
          category: grype-deps

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Grype Dependency Scan (Go + npm)"
            echo "- Scanned Go modules and npm lockfiles across the repo for HIGH/CRITICAL CVEs"
            echo "- Matches lockfile-resolved versions (no module-graph false positives)"
          } >> "$GITHUB_STEP_SUMMARY"

  gosec:
    name: "🔐 Security: Gosec SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run Gosec
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889  # v2.27.1
        with:
          # Report-only: gosec is heuristic (e.g. G115 int->uint conversions in
          # the benchmark helpers) and feeds findings to the Security tab via the
          # SARIF upload below. Build gating is handled by CodeQL (ruleset-enforced),
          # Grype, and govulncheck, so -no-fail keeps gosec from failing the run
          # on advisory-level findings while still surfacing them for triage.
          args: -no-fail -fmt sarif -out gosec-results.sarif ./...

      - name: Upload Gosec SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  # NOTE: testssl job omitted — Portwing does not operate a TLS listener of its own
  # (TLS is handled by a reverse proxy in front). Re-add if Portwing gains direct
  # TLS termination.
