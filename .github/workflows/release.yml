name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release archives and checksums
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt

      - name: Attest container image digests
        shell: bash
        run: |
          DIGESTS=$(jq -r '.[] | select(.type == "Docker Image") | .extra.Digest // empty' dist/artifacts.json 2>/dev/null || true)
          if [ -z "$DIGESTS" ]; then
            echo "No image digests found in dist/artifacts.json, skipping image attestation."
            exit 0
          fi
          echo "$DIGESTS" | while read -r digest; do
            gh attestation create \
              --subject-name ghcr.io/codeswhat/lookout \
              --subject-digest "$digest" \
              --repo "${{ github.repository }}" || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
