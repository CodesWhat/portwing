name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve container manifest digest
        id: manifest-digest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/codeswhat/lookout:${VERSION}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"' || true)
          if [ -z "$DIGEST" ]; then
            echo "No manifest digest resolved, skipping image attestation."
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # Attests every artifact listed in checksums.txt (all release archives).
      # Verify with: gh attestation verify <archive> --repo CodesWhat/lookout
      - name: Attest release archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: dist/checksums.txt

      # Container images are cosign keyless-signed by GoReleaser docker_signs;
      # the version-tag manifest additionally gets build provenance here.
      - name: Attest container manifest
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/codeswhat/lookout
          subject-digest: ${{ steps.manifest-digest.outputs.digest }}
          push-to-registry: true
        if: steps.manifest-digest.outputs.digest != ''
