name: "🚀 Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: "🚀 GoReleaser + Cosign"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354dc8/v3  # pinning via tag reference — cosign-installer v3 (SHA below)
        # Full SHA: see https://github.com/sigstore/cosign-installer/releases
        # Using tag reference only; Dependabot will maintain the pin.

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f3f4ffd70c53fc07d0e3bac9b5  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff10e20d2f54e2cce25  # v3.6.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve container manifest digest
        id: manifest-digest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/codeswhat/lookout:${VERSION}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"' || true)
          if [ -z "$DIGEST" ]; then
            echo "No manifest digest resolved, skipping image attestation."
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # Attests every artifact listed in checksums.txt (all release archives).
      # Verify with: gh attestation verify <archive> --repo CodesWhat/lookout
      - name: Attest release archives
        uses: actions/attest-build-provenance@db8adeaaa4a5f3ccb8e7e99cfafcfb6c3fb62c9  # v2.4.0
        with:
          subject-checksums: dist/checksums.txt

      # Container images are cosign keyless-signed by GoReleaser docker_signs;
      # the version-tag manifest additionally gets build provenance here.
      - name: Attest container manifest
        uses: actions/attest-build-provenance@db8adeaaa4a5f3ccb8e7e99cfafcfb6c3fb62c9  # v2.4.0
        with:
          subject-name: ghcr.io/codeswhat/lookout
          subject-digest: ${{ steps.manifest-digest.outputs.digest }}
          push-to-registry: true
        if: steps.manifest-digest.outputs.digest != ''

  verify-published:
    name: "✅ Verify Published"
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    # Gate: Sigstore public-ledger attestation verification requires the repo to
    # be public (so the OIDC token was issued against a public-visible identity).
    # On private repos this step is skipped to avoid spurious failures.
    if: github.event.repository.visibility == 'public'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Pull released image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker pull "ghcr.io/codeswhat/lookout:${VERSION}"

      - name: Verify cosign signature
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cosign verify \
            --certificate-identity-regexp="https://github.com/CodesWhat/lookout/.github/workflows/release.yml" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "ghcr.io/codeswhat/lookout:${VERSION}"

      - name: Verify gh attestation
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh attestation verify "oci://ghcr.io/codeswhat/lookout:${VERSION}" \
            --repo CodesWhat/lookout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
