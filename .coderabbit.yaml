# CodeRabbit configuration: portwing
language: en-US
early_access: true
enable_free_tier: true

tone_instructions: >-
  Reviewing AI-agent Go code in a security-critical Docker proxy. Terse and
  direct. State problem and fix with code. Skip praise and rhetoric. Flag auth
  weakening, widened API surface, missed conventions, existing utilities. Only
  actionable feedback.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: >-
    This summary will be read by an AI coding agent (Claude Code), not a human.
    Be direct and structured. Use a changelog with emojis: ✨ Added, 🔧 Changed,
    🐛 Fixed, 🗑️ Removed, ⚠️ Breaking, 🔒 Security. After the changelog, list
    any concerns or issues the agent should address as a flat bullet list — no
    prose, no praise, no context the agent already knows from the diff.
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  review_details: false
  review_status: true
  commit_status: true
  fail_commit_status: false
  poem: false
  in_progress_fortune: false
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  enable_prompt_for_ai_agents: true
  abort_on_close: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[skip review]"

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/*.lock"
    - "!**/*.generated.*"
    - "!website/public/**"
    - "!docs/public/**"
    - "!CHANGELOG.md"

  path_instructions:
    - path: "internal/auth/**"
      instructions: |
        Ed25519 per-request auth. Flag anything that weakens signature verification, timing safety, or replay protection.
    - path: "internal/**"
      instructions: |
        Security-critical proxy path with a default-deny posture. Flag new Docker API surface or endpoints that bypass explicit filtering.
    - path: "**/*_test.go"
      instructions: |
        Test files. Don't suggest error handling or refactors in test code.
    - path: "website/**"
      instructions: |
        Marketing site. Light review only, skip style nitpicks.
    - path: "docs/**"
      instructions: |
        Docs site. Review for accuracy against the code, not prose style.

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "off"
    description:
      mode: "off"
    issue_assessment:
      mode: "warning"

  tools:
    golangci-lint:
      enabled: true
    biome:
      enabled: true
    shellcheck:
      enabled: true
    hadolint:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    ast-grep:
      essential_rules: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: false

knowledge_base:
  opt_out: false
  learnings:
    scope: local
  issues:
    scope: local
  # Default filePatterns already cover CLAUDE.md / AGENTS.md / .cursorrules
  code_guidelines:
    enabled: true
  web_search:
    enabled: true
  pull_requests:
    scope: local

chat:
  auto_reply: true
  art: false
