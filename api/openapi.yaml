  /api/v1/events:
    get:
      operationId: getGenericEvents
      summary: Docker lifecycle event stream (generic adapter)
      description: >
        Server-Sent Events stream of Docker container lifecycle events in a
        stable generic envelope. Available when `ADAPTER=generic`.

        Each event is a JSON object on a `data:` line followed by a blank line
        (standard SSE format). A comment heartbeat (`": heartbeat"`) is sent
        every 30 seconds to keep the connection alive. The stream reconnects
        internally with exponential backoff if Docker becomes unavailable.

        Client disconnect cleanly terminates the stream.

        **Event actions** (from `allowedActions` in `internal/docker/events.go`):
        `create`, `start`, `stop`, `die`, `kill`, `restart`, `pause`,
        `unpause`, `destroy`, `rename`, `update`, `oom`, `health_status`.

        **Example stream:**
        ```
        data: {"ts":"2026-06-11T10:00:00Z","type":"container","action":"start","containerId":"abc123","name":"my-app","image":"nginx:latest"}

        : heartbeat

        data: {"ts":"2026-06-11T10:00:30Z","type":"container","action":"die","containerId":"abc123","name":"my-app","image":"nginx:latest","labels":{"app":"web"}}
        ```
      tags: [Generic]
      security:
        - bearerToken: []
        - portwingToken: []
      responses:
        "200":
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Newline-delimited SSE frames. Each `data:` frame contains a
                  `GenericEvent` JSON object.
        "401":
          description: Missing or invalid token.
        "429":
          description: Rate limit exceeded.
        "500":
          description: Streaming not supported by server.

  /v1.44/{path}:
    x-docker-proxy: true
    get:
      operationId: dockerProxyGet
      summary: Docker Engine API proxy (representative entry)
      description: >
        **All paths not matched by a named route above are transparently
        proxied to the local Docker daemon.** This entry is representative;
        the full API surface is the Docker Engine API at
        https://docs.docker.com/engine/api/v1.44/.

        The agent negotiates the API version on startup (e.g., `v1.47`);
        `v1.44` is the fallback. Clients may omit the version prefix — the
        agent prepends it automatically.

        Streaming endpoints (`/logs`, `/attach`, `/exec/*/start`, `/events`,
        `/build`, `/images/create`, `/images/push`) are detected by path and
        forwarded with flush-on-read streaming. Interactive exec sessions
        using `Upgrade: tcp` or `Upgrade: websocket` are handled via HTTP
        hijacking. Bearer auth is required for all proxy paths.
      tags: [Docker Proxy]
      security:
        - bearerToken: []
        - portwingToken: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          example: "containers/json"
      responses:
        "200":
          description: Response from Docker daemon (format varies by endpoint).
        "401":
          description: Missing or invalid token.
        "429":
          description: Rate limit exceeded.
        "502":
          description: Docker daemon unreachable or returned an error.

  /api/portwing/enroll:
    post:
      operationId: enrollPublicKey
      summary: Register an Ed25519 public key (Model C enrollment)
      description: |
        One-shot bootstrap endpoint that registers an Ed25519 public key using
        a pre-configured enrollment token. The token is burned after first
        successful use; subsequent calls are rejected until the agent restarts
        with a new `ENROLLMENT_TOKEN`.

        This endpoint is **only available** when `ENROLLMENT_TOKEN` (and
        `AUTHORIZED_KEYS`) are configured. It is reachable without prior
        authentication — the enrollment token IS the credential — but it is
        rate-limited. Bad enrollment credentials feed the authentication
        failure limiter; malformed or oversized bodies feed a separate per-IP
        abuse limiter. Request bodies are capped at 64 KiB.

        On success the public key is appended to the authorized-keys file and
        the key registry is hot-reloaded. The new key is immediately active.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollment_token, public_key]
              properties:
                enrollment_token:
                  type: string
                  description: The pre-configured enrollment token.
                  example: "a3f2b1c9d8e7f6a4b5c6d7e8f9a0b1c2"
                public_key:
                  type: string
                  description: >
                    Base64 (standard encoding) of the raw 32-byte Ed25519
                    public key to register.
                  example: "AAAAC3NzaC1lZDI1NTE5AAAAIB3..."
      responses:
        "200":
          description: Key enrolled successfully.
          content:
            application/json:
              schema:
                type: object
                required: [key_id]
                properties:
                  key_id:
                    type: string
                    description: hex(SHA-256(pubkey)[:8]) — the Key-ID for subsequent requests.
                    example: "4a3f2b1c9d8e7f6a"
                  comment:
                    type: string
                    description: Comment assigned to the enrolled key.
                    example: "enrolled:4a3f2b1c9d8e7f6a"
        "400":
          description: Invalid request body, bad base64, or wrong key length.
        "401":
          description: Wrong enrollment token, or token already burned.
        "413":
          description: Request body exceeds the 64 KiB enrollment limit.
        "405":
          description: Method not allowed (POST required).
        "429":
          description: Rate limit exceeded.
        "500":
          description: Could not write to the authorized_keys file.

tags:
  - name: Health
    description: Health check endpoints (no auth).
  - name: Agent
    description: Portwing agent metadata endpoints.
  - name: Auth
    description: Ed25519 key enrollment (Model C bootstrap).
  - name: Compose
    description: Docker Compose lifecycle management.
  - name: Metrics
    description: Prometheus-format host and agent metrics.
  - name: MCP
    description: Read-only Model Context Protocol server (`/_portwing/mcp`).
  - name: Drydock Compat
    description: Drydock-compatible REST and SSE endpoints (`/api/*`).
  - name: Generic
    description: >
      Standalone headless management API (`/api/v1/*`). Active when
      `ADAPTER=generic`. No external controller required.
  - name: Docker Proxy
    description: Transparent proxy to the local Docker Engine API.
