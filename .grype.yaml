# Grype reports Go module vulnerabilities embedded in the third-party
# docker-compose executable packaged from Wolfi. Keep these ignores scoped to
# that binary and review them by 2026-07-15 when Wolfi ships updated packages.
ignore:
  - vulnerability: GO-2026-5026
    reason: "Embedded in Wolfi docker-compose binary; review by 2026-07-15."
    package:
      name: golang.org/x/net
      version: v0.54.0
      type: go-module
      location: "**/usr/bin/docker-compose"
  - vulnerability: GO-2026-5028
    reason: "Embedded in Wolfi docker-compose binary; review by 2026-07-15."
